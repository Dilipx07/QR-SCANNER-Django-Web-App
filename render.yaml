services:
  - type: web
    name: qrscanner
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python manage.py migrate && python manage.py seed_scanner_login && gunicorn QRSCANNER.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: "sqlite"
      - key: SQLITE_NAME
        value: "/opt/render/project/src/db.sqlite3"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: HEALTH_CHECK_INTERVAL_SECONDS
        value: "5"
      - key: HEALTH_CHECK_SCHEDULER_ENABLED
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECRET_KEY
        generateValue: true
      - key: QRSCANNER_LOGIN_USERNAME
        value: "admin"
      - key: QRSCANNER_LOGIN_PASSWORD
        value: "ChangeMe123!"
